<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stellar Shader Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:'JetBrains Mono','Fira Code',monospace;overflow:hidden}
.grid{display:grid;grid-template-columns:320px 1fr;height:100vh}
.sidebar{background:#12121a;padding:24px;overflow-y:auto;border-right:1px solid #2a2a3a;z-index:1}
.canvas-wrap{display:flex;align-items:center;justify-content:center;position:relative;background:#05050a}
#gl-canvas{width:100%;height:100%;display:block}
h1{font-size:18px;color:#8be9fd;margin-bottom:2px}
.subtitle{font-size:12px;color:#6272a4;margin-bottom:16px}
.param-group{margin-bottom:14px}
.param-group label{display:block;font-size:11px;color:#bd93f9;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}
.param-group input[type=range]{width:100%;accent-color:#8be9fd;background:transparent}
.param-group .value{float:right;font-size:12px;color:#50fa7b}
.presets{margin-bottom:16px}
.presets h3{font-size:11px;color:#bd93f9;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.preset-btn{background:#1e1e2e;border:1px solid #2a2a3a;color:#f8f8f2;padding:5px 4px;font-size:10px;cursor:pointer;border-radius:4px;font-family:inherit;transition:.15s}
.preset-btn:hover{background:#8be9fd22;border-color:#8be9fd}
.preset-btn .class{display:block;font-size:13px;font-weight:700}
.preset-btn .teff{display:block;font-size:9px;color:#6272a4}
.star-info{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;background:rgba(10,10,15,.7);padding:12px 24px;border-radius:12px;border:1px solid rgba(255,255,255,.06)}
.star-info .class{color:#8be9fd;font-size:20px;font-weight:700}
.star-info .detail{font-size:12px;color:#6272a4;margin-top:4px}
.star-info .detail span{color:#f8f8f2}
.fps{bottom:12px;right:16px;position:absolute;font-size:11px;color:#6272a4;pointer-events:none;font-family:inherit;background:rgba(10,10,15,.6);padding:4px 10px;border-radius:6px}
</style>
</head>
<body>
<div class="grid">
<div class="sidebar">
<h1>Stellar Shader</h1>
<div class="subtitle">GPU-accelerated Star Renderer</div>

<div class="presets">
<h3>Star Presets</h3>
<div class="preset-grid">
<button class="preset-btn" onclick="setPreset(3.6,10.0,3200)"><span class="class">M</span><span class="teff">3200K Red Dwarf</span></button>
<button class="preset-btn" onclick="setPreset(1.4,7.5,4800)"><span class="class">K</span><span class="teff">4800K Orange</span></button>
<button class="preset-btn" onclick="setPreset(0.8,4.5,5800)"><span class="class">G</span><span class="teff">5800K Solar</span></button>
<button class="preset-btn" onclick="setPreset(0.4,2.5,7200)"><span class="class">F</span><span class="teff">7200K Yellow-White</span></button>
<button class="preset-btn" onclick="setPreset(0.0,1.0,9500)"><span class="class">A</span><span class="teff">9500K White</span></button>
<button class="preset-btn" onclick="setPreset(-0.2,-1.0,15000)"><span class="class">B</span><span class="teff">15kK Blue</span></button>
<button class="preset-btn" onclick="setPreset(-0.3,-4.0,30000)"><span class="class">O</span><span class="teff">30kK Blue Giant</span></button>
<button class="preset-btn" onclick="setPreset(1.8,-2.0,4300)"><span class="class">KIII</span><span class="teff">4300K Giant</span></button>
</div>
</div>

<div class="param-group">
<label>bp_rp (color index) <span class="value" id="bp_rp_val">0.80</span></label>
<input type="range" id="bp_rp" min="-0.5" max="5.0" step="0.01" value="0.80" oninput="updateVal('bp_rp')">
</div>

<div class="param-group">
<label>M_G (abs magnitude) <span class="value" id="m_g_val">4.50</span></label>
<input type="range" id="m_g" min="-6" max="14" step="0.1" value="4.5" oninput="updateVal('m_g')">
</div>

<div class="param-group">
<label>T_eff (temperature K) <span class="value" id="teff_val">5,778</span></label>
<input type="range" id="teff" min="2000" max="40000" step="100" value="5778" oninput="updateVal('teff')">
</div>

<div class="param-group">
<label>Noise Scale <span class="value" id="scale_val">2.0</span></label>
<input type="range" id="nscale" min="0.5" max="8.0" step="0.1" value="2.0" oninput="updateVal('nscale')">
</div>

<div class="param-group">
<label>Animation Speed <span class="value" id="speed_val">1.0</span></label>
<input type="range" id="nspeed" min="0.0" max="3.0" step="0.05" value="1.0" oninput="updateVal('nspeed')">
</div>

<div class="param-group">
<label>Contrast (noise strength) <span class="value" id="contrast_val">0.35</span></label>
<input type="range" id="ncontrast" min="0.0" max="0.7" step="0.01" value="0.35" oninput="updateVal('ncontrast')">
</div>
</div>

<div class="canvas-wrap">
<canvas id="gl-canvas"></canvas>
<div class="star-info">
<div class="class" id="star-class">G-type Solar</div>
<div class="detail"><span id="star-teff">T_eff = 5,778 K</span> &middot; <span id="star-bprp">bp_rp = 0.80</span></div>
</div>
<div class="fps" id="fps-display">-- FPS</div>
</div>
</div>

<script>
function updateVal(id) {
    const el = document.getElementById(id);
    const val = document.getElementById(id + '_val');
    if (id === 'teff') {
        val.textContent = parseInt(el.value).toLocaleString();
    } else if (id === 'nscale') {
        val.textContent = parseFloat(el.value).toFixed(1);
    } else if (id === 'nspeed' || id === 'ncontrast') {
        val.textContent = parseFloat(el.value).toFixed(2);
    } else {
        val.textContent = parseFloat(el.value).toFixed(2);
    }
    if (id === 'bp_rp' || id === 'teff') updateStarClass();
    scheduleRender();
}

function setPreset(bpRp, mG, teff) {
    document.getElementById('bp_rp').value = bpRp;
    document.getElementById('m_g').value = mG;
    document.getElementById('teff').value = teff;
    updateVal('bp_rp'); updateVal('m_g'); updateVal('teff');
    updateStarClass();
    scheduleRender();
}

function classifyStar(teff) {
    if (teff >= 30000) return 'O-type Blue Supergiant';
    if (teff >= 10000) return 'B-type Blue Giant';
    if (teff >= 7500) return 'A-type White Star';
    if (teff >= 6000) return 'F-type Yellow-White';
    if (teff >= 5200) return 'G-type Solar';
    if (teff >= 3700) return 'K-type Orange Dwarf';
    return 'M-type Red Dwarf';
}

function updateStarClass() {
    const teff = parseInt(document.getElementById('teff').value);
    const bpRp = parseFloat(document.getElementById('bp_rp').value);
    document.getElementById('star-class').textContent = classifyStar(teff);
    document.getElementById('star-teff').textContent = 'T_eff = ' + teff.toLocaleString() + ' K';
    document.getElementById('star-bprp').textContent = 'bp_rp = ' + bpRp.toFixed(2);
}

// ---- WebGL2 Shader ----

const VERT_SRC = `#version 300 es
in vec2 aPos;
out vec2 vUv;
void main() {
    vUv = aPos;
    gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const FRAG_SRC = `#version 300 es
precision highp float;

in vec2 vUv;
uniform float uTime;
uniform float uTeff;
uniform float uBpRp;
uniform float uScale;
uniform float uSpeed;
uniform float uContrast;

out vec4 fragColor;

// --- 3D Value Noise ---
float hash(vec3 p) {
    p = fract(p * 0.3183099 + 0.1);
    p *= 17.0;
    return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}

float noise3D(vec3 p) {
    vec3 i = floor(p);
    vec3 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
        mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x),
            mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
        mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x),
            mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y),
    f.z);
}

float fbm(vec3 p) {
    float v = 0.0, a = 0.5, f = 1.0;
    for (int i = 0; i < 5; i++) {
        v += a * noise3D(p * f);
        f *= 2.0;
        a *= 0.5;
    }
    return v;
}

// --- Star Base Color (matches SIREN dataset) ---
vec3 starBaseColor(float teff, float bp_rp) {
    vec3 c;
    if (teff > 30000.0) {
        c = vec3(0.62, 0.69, 1.0);
    } else if (teff > 10000.0) {
        float f = (teff - 10000.0) / 20000.0;
        c = vec3(0.70 - 0.08*f, 0.77 - 0.08*f, 0.95 + 0.05*f);
    } else if (teff > 7500.0) {
        float f = (teff - 7500.0) / 2500.0;
        c = vec3(0.82 - 0.12*f, 0.85 - 0.08*f, 0.95);
    } else if (teff > 6000.0) {
        float f = (teff - 6000.0) / 1500.0;
        c = vec3(0.95 - 0.13*f, 0.93 - 0.08*f, 0.90 + 0.05*f);
    } else if (teff > 5200.0) {
        float f = (teff - 5200.0) / 800.0;
        c = vec3(1.0, 1.0 - 0.07*f, 0.82 + 0.08*f);
    } else if (teff > 3700.0) {
        float f = (teff - 3700.0) / 1500.0;
        c = vec3(1.0, 0.85 + 0.08*f, 0.65 + 0.25*f);
    } else {
        c = vec3(1.0, 0.55, 0.35);
    }

    float bp_tint = (bp_rp - 0.5) / 4.0;
    c.r = clamp(c.r - bp_tint * 0.05, 0.0, 1.0);
    c.g = clamp(c.g - bp_tint * 0.03, 0.0, 1.0);
    c.b = clamp(c.b + bp_tint * 0.05, 0.0, 1.0);
    return c;
}

void main() {
    vec2 uv = vUv;

    float r = length(uv);
    float disk = smoothstep(1.005, 0.992, r);
    if (disk < 0.001) { fragColor = vec4(0.0); return; }

    // Limb darkening
    float mu = sqrt(max(1.0 - r*r, 0.0));
    float limb = 1.0 - 0.6 * (1.0 - mu);

    // Base color
    vec3 base = starBaseColor(uTeff, uBpRp);

    // Plasma noise
    vec3 np = vec3(uv * uScale, uTime * uSpeed);
    float n = fbm(np);
    float n2 = fbm(np * 1.7 + 100.0);

    // Combine: dark sinking plasma + bright rising plasma
    float plasma = (n - 0.5) * uContrast * 2.0;

    // Color variation: dark spots shift toward red/black, bright toward blue
    vec3 color = base * (1.0 + plasma);
    color += plasma * 0.3 * (vec3(0.2, -0.1, -0.3)); // redden dim, blue brighten

    // Apply limb darkening
    color *= limb;

    // Granulation detail
    float gran = fbm(np * 3.0 + 50.0) - 0.5;
    color += base * gran * 0.04;

    // Limb brightening / corona
    float glow = exp(-(1.0 - r) * 12.0) * 0.08;
    float corona = smoothstep(0.85, 1.05, r) * exp(-(r - 0.85) * 8.0) * 0.15;
    vec3 coronaColor = mix(base, vec3(1.0, 0.7, 0.3), 0.5);
    color += glow * base * (0.5 + 0.5 * n2);
    color += corona * coronaColor * (0.5 + 0.5 * n);

    // Hot spots (convection cells)
    float hot = smoothstep(0.55, 0.75, n) * 0.08;
    color += hot * base * 1.5;

    // Cold sinking spots
    float cold = smoothstep(0.65, 0.45, n) * 0.06;
    color -= cold * base * 0.5;

    fragColor = vec4(max(color * disk, 0.0), 1.0);
}`;

// --- WebGL2 Setup ---
let canvas, gl, program, uTime, uTeff, uBpRp, uScale, uSpeed, uContrast;
let animId = null, renderPending = false, time = 0, frameCount = 0, lastFpsUpdate = 0;

function compileShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
        gl.deleteShader(s);
        return null;
    }
    return s;
}

function initGL() {
    canvas = document.getElementById('gl-canvas');
    gl = canvas.getContext('webgl2', { antialias: true, alpha: false });
    if (!gl) { document.querySelector('.canvas-wrap').innerHTML = '<p style="color:#ff5555;padding:40px">WebGL2 not supported</p>'; return; }

    const vs = compileShader(VERT_SRC, gl.VERTEX_SHADER);
    const fs = compileShader(FRAG_SRC, gl.FRAGMENT_SHADER);
    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(program));
        return;
    }

    uTime = gl.getUniformLocation(program, 'uTime');
    uTeff = gl.getUniformLocation(program, 'uTeff');
    uBpRp = gl.getUniformLocation(program, 'uBpRp');
    uScale = gl.getUniformLocation(program, 'uScale');
    uSpeed = gl.getUniformLocation(program, 'uSpeed');
    uContrast = gl.getUniformLocation(program, 'uContrast');

    const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

    const aPos = gl.getAttribLocation(program, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    startLoop();
}

function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    gl.viewport(0, 0, canvas.width, canvas.height);
    scheduleRender();
}

function scheduleRender() {
    if (!renderPending) {
        renderPending = true;
        requestAnimationFrame(() => { renderPending = false; draw(); });
    }
}

let drawCount = 0;

function draw() {
    if (!gl || !program) return;
    gl.useProgram(program);
    gl.uniform1f(uTime, time);
    gl.uniform1f(uTeff, parseFloat(document.getElementById('teff').value));
    gl.uniform1f(uBpRp, parseFloat(document.getElementById('bp_rp').value));
    gl.uniform1f(uScale, parseFloat(document.getElementById('nscale').value));
    gl.uniform1f(uSpeed, parseFloat(document.getElementById('nspeed').value));
    gl.uniform1f(uContrast, parseFloat(document.getElementById('ncontrast').value));
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function startLoop() {
    let lastTime = 0;
    lastFpsUpdate = performance.now();
    frameCount = 0;

    function loop(now) {
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        time += dt;

        draw();

        frameCount++;
        const elapsed = now - lastFpsUpdate;
        if (elapsed >= 1000) {
            document.getElementById('fps-display').textContent = Math.round(frameCount / elapsed * 1000) + ' FPS';
            frameCount = 0;
            lastFpsUpdate = now;
        }

        animId = requestAnimationFrame(loop);
    }
    animId = requestAnimationFrame(loop);
}

updateStarClass();
initGL();
</script>
</body>
</html>
