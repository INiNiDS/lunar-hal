# Full local simulation of DO: MinIO as S3 + a lunar-hal container.
#
# Usage:
#   podman-compose -f install/podman-compose.yml up
#
# What you get:
#   - MinIO on :9000 (S3 API) and :9001 (console)
#   - init-bucket creates the "lunar-hal-data" bucket
#   - the lunar container waits for MinIO and runs the pipeline
#   - results land in ./data/

services:
  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Creates the bucket once, so orchestrate can push to it immediately.
  init-bucket:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/lunar-hal-data || true &&
      mc anonymous set download local/lunar-hal-data || true
      "

  lunar:
    build:
      context: ..
      dockerfile: install/Containerfile
    depends_on:
      minio:
        condition: service_healthy
      init-bucket:
        condition: service_completed_successfully
    security_opt:
      - label=disable
    env_file:
      - ../.env
      # All runtime envs (GAIA_*, SINK_KIND, SPACES_*, TOTAL_STARS, CHUNK_SIZE,
      # JOBS) come from ../.env — see .env.example for the full list. Override
      # inline only for ad-hoc runs:
      #   GAIA_USER=... podman-compose -f install/podman-compose.yml up
    volumes:
      - ../data:/work

volumes:
  minio-data: